<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-push { background: #18A0FB; color: white; }
    .btn-pull { background: #1BC47D; color: white; }
    #status { font-size: 11px; color: #666; background: #eee; padding: 8px; border-radius: 4px; min-height: 20px; }
  </style>
</head>
<body>
  <button class="btn-push" id="pushBtn">📤 Push to GitHub</button>
  <button class="btn-pull" id="pullBtn">📥 Fix Selection (from GitHub)</button>
  <div id="status">Ready</div>

  <script>
    const CONFIG = {
      repo: 'otsekj/Tok-sync', // ПРОВЕРЬ ЭТО ИМЯ!
      path: 'tokens.json',
      branch: 'main'
    };

    let savedToken = '';

    // При старте запрашиваем токен из хранилища Figma
    window.onload = () => {
      parent.postMessage({ pluginMessage: { type: 'get-token' } }, '*');
    };

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'token-loaded') {
        savedToken = msg.token || '';
        if (!savedToken) {
          const input = prompt("GitHub Token не найден. Вставьте ваш ghp_... токен:");
          if (input) {
            savedToken = input;
            parent.postMessage({ pluginMessage: { type: 'save-token', token: input } }, '*');
          }
        }
      }

      if (msg.type === 'push-to-github') {
        await uploadToGithub(msg.data);
      }
    };

    document.getElementById('pushBtn').onclick = () => {
      if (!savedToken) return alert("Нужен токен!");
      document.getElementById('status').innerText = "Processing Figma variables...";
      parent.postMessage({ pluginMessage: { type: 'prepare-export' } }, '*');
    };

    document.getElementById('pullBtn').onclick = async () => {
      if (!savedToken) return alert("Нужен токен!");
      document.getElementById('status').innerText = "Fetching data from GitHub...";
      try {
        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${savedToken}` } });
        const file = await res.json();
        const data = JSON.parse(atob(file.content));
        parent.postMessage({ pluginMessage: { type: 'apply-from-github', data } }, '*');
      } catch (e) {
        document.getElementById('status').innerText = "❌ Error: File not found on GitHub";
      }
    };

    async function uploadToGithub(jsonData) {
      const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
      
      // 1. Пытаемся получить SHA текущего файла
      const getFile = await fetch(url, { headers: { 'Authorization': `token ${savedToken}` } });
      let sha = getFile.ok ? (await getFile.json()).sha : null;

      // 2. Пушим новый контент
      const res = await fetch(url, {
        method: 'PUT',
        headers: { 
          'Authorization': `token ${savedToken}`, 
          'Content-Type': 'application/json' 
        },
        body: JSON.stringify({
          message: "Update tokens from Figma",
          content: btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2)))),
          sha: sha, 
          branch: CONFIG.branch
        })
      });

      if (res.ok) {
        document.getElementById('status').innerText = "✅ Updated on GitHub!";
      } else {
        const err = await res.json();
        document.getElementById('status').innerText = "❌ GitHub Error: " + err.message;
      }
    }
  </script>
</body>
</html>
