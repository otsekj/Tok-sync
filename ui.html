<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-push { background: #18A0FB; color: white; }
    .btn-pull { background: #1BC47D; color: white; }
    #status { font-size: 11px; color: #666; background: #eee; padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <button class="btn-push" id="pushBtn">📤 Push to GitHub</button>
  <button class="btn-pull" id="pullBtn">📥 Fix Selection (from GitHub)</button>
  <div id="status">Ready</div>

  <script>
    const CONFIG = {
      token: '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',
      repo: 'otsekj/tokens-sync',
      path: 'tokens.json',
      branch: 'main'
    };

    // Отправка в GitHub
    document.getElementById('pushBtn').onclick = () => {
      document.getElementById('status').innerText = "Processing Figma variables...";
      parent.postMessage({ pluginMessage: { type: 'prepare-export' } }, '*');
    };

    // Исправление макета
    document.getElementById('pullBtn').onclick = async () => {
      document.getElementById('status').innerText = "Fetching data from GitHub...";
      const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
      const res = await fetch(url, { headers: { 'Authorization': `token ${CONFIG.token}` } });
      const file = await res.json();
      const data = JSON.parse(atob(file.content));
      parent.postMessage({ pluginMessage: { type: 'apply-from-github', data } }, '*');
    };

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'push-to-github') {
        await uploadToGithub(msg.data);
      }
    };

    async function uploadToGithub(jsonData) {
      const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
      const getFile = await fetch(url, { headers: { 'Authorization': `token ${CONFIG.token}` } });
      let sha = getFile.ok ? (await getFile.json()).sha : null;

      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: "Update from Figma",
          content: btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2)))),
          sha: sha, branch: CONFIG.branch
        })
      });
      document.getElementById('status').innerText = res.ok ? "✅ Updated on GitHub!" : "❌ Error";
    }
  </script>
</body>
</html>
