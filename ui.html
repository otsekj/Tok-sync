<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #f9f9f9; }
    button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .btn-push { background: #18A0FB; color: white; }
    .btn-pull { background: #1BC47D; color: white; }
    .btn-save { background: #333; color: white; margin-top: 5px; }
    #status { font-size: 11px; color: #666; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #eee; min-height: 20px; }
    #token-section { display: flex; flex-direction: column; gap: 8px; padding: 10px; border: 1px dashed #18A0FB; border-radius: 6px; }
    .hidden { display: none !important; }
    label { font-size: 12px; font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <div id="token-section">
    <label>GitHub Personal Access Token:</label>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn-save" id="saveTokenBtn">Save Token Locally</button>
  </div>

  <button class="btn-push" id="pushBtn">📤 Push Variables to GitHub</button>
  <button class="btn-pull" id="pullBtn">📥 Fix Selection (from GitHub)</button>
  
  <div id="status">Ready</div>
  <button style="background:none; color:#aaa; font-size:10px; text-decoration:underline;" id="resetToken">Reset Token</button>

  <script>
    let GITHUB_TOKEN = '';
    const CONFIG = {
      repo: 'otsekj/Tok-sync', // ВПИШИ СВОЙ РЕПОЗИТОРИЙ ТУТ
      path: 'tokens.json',
      branch: 'main'
    };

    const status = document.getElementById('status');
    const tokenSection = document.getElementById('token-section');

    // Слушаем сообщения от code.js
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'token-loaded') {
        GITHUB_TOKEN = msg.token;
        tokenSection.classList.add('hidden');
        status.innerText = "Token loaded from storage";
      }
      if (msg.type === 'push-to-github') {
        uploadToGithub(msg.data);
      }
    };

    // Сохранение токена
    document.getElementById('saveTokenBtn').onclick = () => {
      const val = document.getElementById('ghToken').value.trim();
      if (val) {
        GITHUB_TOKEN = val;
        parent.postMessage({ pluginMessage: { type: 'save-token', token: val } }, '*');
        tokenSection.classList.add('hidden');
      }
    };

    // Сброс токена
    document.getElementById('resetToken').onclick = () => {
      tokenSection.classList.remove('hidden');
      status.innerText = "Please enter new token";
    };

    // Кнопка PUSH
    document.getElementById('pushBtn').onclick = () => {
      if (!GITHUB_TOKEN) return alert("Please save token first!");
      status.innerText = "Analyzing variables...";
      parent.postMessage({ pluginMessage: { type: 'prepare-export' } }, '*');
    };

    // Кнопка PULL (FIX)
    document.getElementById('pullBtn').onclick = async () => {
      if (!GITHUB_TOKEN) return alert("Please save token first!");
      status.innerText = "Downloading from GitHub...";
      try {
        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        const file = await res.json();
        const data = JSON.parse(atob(file.content));
        parent.postMessage({ pluginMessage: { type: 'apply-from-github', data } }, '*');
      } catch (e) {
        status.innerText = "Error: " + e.message;
      }
    };

    async function uploadToGithub(jsonData) {
      const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`;
      try {
        const getFile = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        let sha = getFile.ok ? (await getFile.json()).sha : null;

        const res = await fetch(url, {
          method: 'PUT',
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: "Update tokens from Figma",
            content: btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2)))),
            sha: sha,
            branch: CONFIG.branch
          })
        });
        status.innerText = res.ok ? "✅ Success! GitHub Updated" : "❌ Upload Failed";
      } catch (e) {
        status.innerText = "❌ Network Error";
      }
    }
  </script>
</body>
</html>
